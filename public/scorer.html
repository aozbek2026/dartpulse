<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Hızlı Skor — Dart</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dart Skor" />
<meta name="theme-color" content="#0b0d14" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<link rel="stylesheet" href="/css/style.css" />
<style>
  body { min-height: 100dvh; padding: 0; margin: 0; display: flex; flex-direction: column; touch-action: manipulation; }

  /* Setup paneli */
  #setup-panel { display: flex; flex-direction: column; gap: 1rem; padding: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 500px; margin: 4rem auto; width: calc(100% - 2rem); }
  #setup-panel h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }

  /* Game paneli — board-screen gibi */
  #game-panel { display: none; flex-direction: column; flex: 1; }

  /* Sonuç paneli */
  #result-panel { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 1rem; padding: 2rem; flex: 1; }
  #result-panel .winner-name { font-size: clamp(1.6rem, 6vmin, 2.8rem); font-weight: 900; color: var(--accent); }

  /* Cricket overlay */
  .cricket-state { display: grid; grid-template-columns: auto 1fr auto; gap: 0.4rem 0.8rem; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.7rem 1rem; font-size: clamp(0.8rem, 1.8vmin, 1rem); margin: 0.5rem 0; }
  .cric-marks { display: flex; gap: 3px; }
  .cric-mark { width: 18px; height: 18px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; }
  .cric-mark.hit { background: var(--accent); border-color: var(--accent); color: white; }
  .cric-mark.closed { background: var(--success); border-color: var(--success); color: #062; }
  .cric-num { text-align: center; font-weight: 700; color: var(--text-dim); }

  /* Onay modali */
  .sc-confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 1rem; }
  .sc-confirm-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; max-width: 360px; width: 100%; text-align: center; }
  .sc-confirm-box p { margin: 0 0 1.5rem; font-size: 1rem; line-height: 1.5; }
  .sc-confirm-box .sc-confirm-btns { display: flex; gap: 0.75rem; justify-content: center; }
</style>
</head>
<body>
<div id="scorer-root" style="display:flex;flex-direction:column;flex:1;min-height:100dvh;">

  <!-- Setup -->
  <div id="setup-panel">
    <h2>🖊️ Hızlı Skor</h2>
    <p style="color:var(--text-dim);font-size:0.9rem;margin-top:-0.5rem;">Turnuva olmadan iki oyuncu arasında skor hesabı.</p>

    <div>
      <label>Oyun modu</label>
      <select id="s-mode" style="width:100%;">
        <option value="501">501</option>
        <option value="701">701</option>
        <option value="1001">1001</option>
        <option value="cricket">Cricket</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
      <div>
        <label>1. Oyuncu</label>
        <input id="s-p1" type="text" placeholder="Oyuncu 1" value="Oyuncu 1" style="width:100%;box-sizing:border-box;" />
      </div>
      <div>
        <label>2. Oyuncu</label>
        <input id="s-p2" type="text" placeholder="Oyuncu 2" value="Oyuncu 2" style="width:100%;box-sizing:border-box;" />
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
      <div>
        <label>Kazanmak için leg (Bo?)</label>
        <input id="s-legs" type="number" min="1" max="11" value="2" style="width:100%;box-sizing:border-box;" />
      </div>
      <div>
        <label>Başlayan oyuncu</label>
        <select id="s-starter" style="width:100%;">
          <option value="1">Oyuncu 1</option>
          <option value="2">Oyuncu 2</option>
        </select>
      </div>
    </div>
    <button class="btn primary" onclick="startGame()" style="margin-top:0.5rem;">Oyuna Başla</button>
    <a href="/" style="text-align:center;color:var(--text-dim);font-size:0.85rem;margin-top:0.25rem;">← Ana sayfa</a>
  </div>

  <!-- Oyun ekranı (board layout ile doldurulur) -->
  <div id="game-panel"></div>

  <!-- Sonuç -->
  <div id="result-panel">
    <div style="font-size:3rem;">🏆</div>
    <div style="color:var(--text-dim);font-size:0.9rem;text-transform:uppercase;letter-spacing:0.1em;">Kazanan</div>
    <div class="winner-name" id="winner-name">—</div>
    <div id="result-stats" style="color:var(--text-dim);font-size:0.88rem;"></div>
    <button class="btn primary" onclick="resetGame()">Yeni Oyun</button>
    <a href="/" class="btn secondary">Ana Sayfa</a>
  </div>

</div>

<script>
// ===== State =====
let G = null;
let inputBuf = '';

function startGame() {
  const mode = document.getElementById('s-mode').value;
  const p1 = document.getElementById('s-p1').value.trim() || 'Oyuncu 1';
  const p2 = document.getElementById('s-p2').value.trim() || 'Oyuncu 2';
  const legsToWin = Math.max(1, +document.getElementById('s-legs').value || 2);
  const starter = +document.getElementById('s-starter').value;
  const startScore = { '501': 501, '701': 701, '1001': 1001, 'cricket': 0 }[mode] ?? 501;

  G = {
    mode, names: [null, p1, p2], legsToWin,
    legs: [0, 0, 0],
    turn: starter, starter,
    currentLeg: 1,
    remaining: [0, startScore, startScore],
    totalScore: [0, 0, 0],
    darts: [0, 0, 0],
    turns: [0, 0, 0],
    history: [],  // {slot, score, remaining, bust, leg}
    cricket: initCricket(),
    finished: false, winnerSlot: null,
  };

  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('result-panel').style.display = 'none';
  const gp = document.getElementById('game-panel');
  gp.style.display = 'flex';

  inputBuf = '';
  renderGame();
}

function initCricket() {
  return { marks: { 1: {}, 2: {} }, score: [0, 0, 0], nums: [20, 19, 18, 17, 16, 15, 25] };
}

function resetGame() {
  G = null; inputBuf = '';
  document.getElementById('setup-panel').style.display = 'flex';
  document.getElementById('game-panel').style.display = 'none';
  document.getElementById('result-panel').style.display = 'none';
}

// ===== Onay modali =====
function scConfirm(msg, okLabel = 'Evet', cancelLabel = 'İptal') {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'sc-confirm-overlay';
    overlay.innerHTML = `
      <div class="sc-confirm-box">
        <p>${msg}</p>
        <div class="sc-confirm-btns">
          <button class="btn secondary" id="sc-cancel">${cancelLabel}</button>
          <button class="btn" id="sc-ok" style="background:var(--danger,#ef4444);color:#fff;">${okLabel}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const close = (val) => { overlay.remove(); resolve(val); };
    overlay.querySelector('#sc-ok').onclick = () => close(true);
    overlay.querySelector('#sc-cancel').onclick = () => close(false);
  });
}

// ===== Keypad giriş =====
function scInput(ch) {
  if (!G || G.finished) return;
  if (inputBuf.length >= 3) return;
  inputBuf += ch;
  const el = document.getElementById('sc-input');
  if (el) el.textContent = inputBuf || '0';
}
function scClear() {
  inputBuf = '';
  const el = document.getElementById('sc-input');
  if (el) el.textContent = '0';
}
function scBackspace() {
  inputBuf = inputBuf.slice(0, -1);
  const el = document.getElementById('sc-input');
  if (el) el.textContent = inputBuf || '0';
}
function scSetQuick(score) {
  if (!G || G.finished) return;
  inputBuf = String(score);
  submitScore();
}

function submitScore() {
  if (!G || G.finished) return;
  const score = +inputBuf;
  if (isNaN(score) || score < 0 || score > 180) { scClear(); return; }
  // Flash
  const el = document.getElementById('sc-input');
  if (el) { el.classList.remove('score-flash'); void el.offsetWidth; el.classList.add('score-flash'); }
  inputBuf = '';
  recordThrow(G.turn, score);
}

function cricketMark(num) {
  if (!G || G.finished) return;
  recordCricketMark(G.turn, num);
}

// ===== Oyun mantığı: X01 =====
function recordThrow(slot, score) {
  const cur = G.remaining[slot];
  let newRem = cur - score;
  let bust = false;
  if (newRem < 0 || newRem === 1) { bust = true; newRem = cur; }

  G.history.push({ slot, score, remaining: cur, bust, leg: G.currentLeg });
  G.totalScore[slot] += bust ? 0 : score;
  G.darts[slot] += 3;
  G.turns[slot] += 1;
  if (!bust) G.remaining[slot] = newRem;

  if (newRem === 0 && !bust) {
    G.legs[slot] += 1;
    if (G.legs[slot] >= G.legsToWin) {
      G.finished = true; G.winnerSlot = slot;
    } else {
      const startScore = { '501': 501, '701': 701, '1001': 1001 }[G.mode] ?? 501;
      G.remaining[1] = startScore; G.remaining[2] = startScore;
      G.currentLeg += 1;
      G.starter = G.starter === 1 ? 2 : 1;
      G.turn = G.starter;
    }
  } else {
    G.turn = G.turn === 1 ? 2 : 1;
  }
  renderGame();
}

// ===== Oyun mantığı: Cricket =====
function recordCricketMark(slot, num) {
  const other = slot === 1 ? 2 : 1;
  const myMarks = G.cricket.marks[slot][num] || 0;
  if (myMarks >= 3) { G.turn = other; renderGame(); return; }
  G.cricket.marks[slot][num] = myMarks + 1;
  G.history.push({ slot, num, type: 'cricket', leg: G.currentLeg });
  G.darts[slot] += 3; G.turns[slot] += 1;
  const newMarks = G.cricket.marks[slot][num];
  const theirMarks = G.cricket.marks[other][num] || 0;
  if (newMarks >= 3 && theirMarks < 3) G.cricket.score[slot] += num === 25 ? 25 : num;
  const nums = G.cricket.nums;
  const myAllClosed = nums.every(n => (G.cricket.marks[slot][n] || 0) >= 3);
  const allClosed = nums.every(n => (G.cricket.marks[1][n] || 0) >= 3 && (G.cricket.marks[2][n] || 0) >= 3);
  if (myAllClosed && G.cricket.score[slot] >= G.cricket.score[other]) {
    G.finished = true; G.winnerSlot = slot;
  } else if (allClosed) {
    G.finished = true; G.winnerSlot = G.cricket.score[1] >= G.cricket.score[2] ? 1 : 2;
  } else {
    G.turn = other;
  }
  renderGame();
}

async function undoThrow() {
  if (!G || !G.history.length) return;
  const ok = await scConfirm('Son atışı geri al?', 'Evet, Geri Al', 'İptal');
  if (!ok) return;
  G.history.pop();
  rebuildFromHistory();
  inputBuf = '';
  renderGame();
}

function rebuildFromHistory() {
  const startScore = { '501': 501, '701': 701, '1001': 1001, 'cricket': 0 }[G.mode] ?? 501;
  const history = G.history.slice();
  G.legs = [0, 0, 0]; G.remaining = [0, startScore, startScore];
  G.totalScore = [0, 0, 0]; G.darts = [0, 0, 0]; G.turns = [0, 0, 0];
  G.cricket = initCricket(); G.finished = false; G.winnerSlot = null;
  G.turn = G.starter; G.currentLeg = 1; G.history = [];
  for (const h of history) {
    if (h.type === 'cricket') recordCricketMark(h.slot, h.num);
    else recordThrow(h.slot, h.score);
    if (G.finished) break;
  }
}

// ===== Render =====
function renderGame() {
  if (!G) return;
  const isCricket = G.mode === 'cricket';
  const gp = document.getElementById('game-panel');
  if (!gp) return;

  const e1 = G.names[1], e2 = G.names[2];
  const isTurn1 = G.turn === 1;
  const rem1 = isCricket ? G.cricket.score[1] : G.remaining[1];
  const rem2 = isCricket ? G.cricket.score[2] : G.remaining[2];
  const avg1 = G.darts[1] > 0 ? ((G.totalScore[1] / G.darts[1]) * 3).toFixed(1) : '—';
  const avg2 = G.darts[2] > 0 ? ((G.totalScore[2] / G.darts[2]) * 3).toFixed(1) : '—';

  // Visit geçmişi — mevcut leg
  const legHistory = G.history.filter(h => !h.type && h.leg === G.currentLeg);
  const vis1 = legHistory.filter(h => h.slot === 1).slice(-6);
  const vis2 = legHistory.filter(h => h.slot === 2).slice(-6);
  const visCount = Math.max(vis1.length, vis2.length, 3);
  let historyRows = '';
  for (let i = 0; i < visCount; i++) {
    const t1 = vis1[i], t2 = vis2[i];
    const isLastP1 = t1 && i === vis1.length - 1 && !isTurn1;
    const isLastP2 = t2 && i === vis2.length - 1 && isTurn1;
    const visitNum = Math.max(vis1.length, vis2.length) - visCount + i + 1;
    historyRows += `
      <div class="visit-row">
        <div class="visit-score ${isLastP1 ? 'visit-last' : ''}">${t1 ? (t1.bust ? '<span style="color:var(--danger)">Bust</span>' : t1.score) : ''}</div>
        <div class="visit-num">${t1 || t2 ? visitNum : ''}</div>
        <div class="visit-score visit-score-r ${isLastP2 ? 'visit-last' : ''}">${t2 ? (t2.bust ? '<span style="color:var(--danger)">Bust</span>' : t2.score) : ''}</div>
      </div>`;
  }

  // Cricket keypad
  const cricketKeypad = isCricket ? `
    <div class="keypad">
      <div class="keypad-grid">
        ${G.cricket.nums.map(n => {
          const myMarks = G.cricket.marks[G.turn][n] || 0;
          const theirMarks = G.cricket.marks[G.turn === 1 ? 2 : 1][n] || 0;
          const closed = myMarks >= 3 && theirMarks >= 3;
          return `<button onclick="cricketMark(${n})" ${closed ? 'disabled style="opacity:0.3;"' : ''}>${n === 25 ? 'Bull' : n}</button>`;
        }).join('')}
        ${G.cricket.nums.length < 9 ? '<button disabled style="opacity:0;"></button>'.repeat(9 - G.cricket.nums.length) : ''}
      </div>
    </div>` : `
    <div class="keypad">
      <div class="keypad-top-row">
        <button class="keypad-undo" onclick="undoThrow()">↶ Geri Al</button>
        <div class="keypad-input" id="sc-input" style="min-width:0;">${inputBuf || '0'}</div>
        <button class="keypad-enter" onclick="submitScore()">Gönder ▶</button>
      </div>
      <div class="keypad-main">
        <div class="quick-side">
          ${[26, 40, 41, 43].map(s => `<button class="quick-btn" onclick="scSetQuick(${s})">${s}</button>`).join('')}
        </div>
        <div class="keypad-grid">
          ${[1,2,3,4,5,6,7,8,9].map(n => `<button onclick="scInput('${n}')">${n}</button>`).join('')}
          <button class="action" onclick="scClear()">C</button>
          <button onclick="scInput('0')">0</button>
          <button class="action bust-btn" onclick="scSetQuick(0)">Bust</button>
        </div>
        <div class="quick-side">
          ${[45, 60, 81, 85].map(s => `<button class="quick-btn" onclick="scSetQuick(${s})">${s}</button>`).join('')}
        </div>
      </div>
    </div>`;

  // Cricket board
  const cricketBoard = isCricket ? renderCricketBoard() : '';

  gp.innerHTML = `
    <div class="board-header">
      <div>
        <div class="board-name">Hızlı Skor</div>
        <div class="match-info">${G.mode.toUpperCase()} · Bo${G.legsToWin * 2 - 1} · Leg ${G.currentLeg} · Sıra: <strong>${isTurn1 ? e1 : e2}</strong></div>
      </div>
      <div style="display:flex;gap:0.5rem;">
        <button class="btn secondary" style="font-size:0.82rem;padding:0.4rem 0.75rem;" onclick="undoThrow()">↶</button>
        <button class="btn danger" style="font-size:0.82rem;padding:0.4rem 0.75rem;" onclick="resetGame()">Yeniden</button>
      </div>
    </div>

    <div class="match-display">
      <div class="player-panel ${isTurn1 && !G.finished ? 'active' : ''}">
        <div class="player-name">${e1}</div>
        <div class="player-sub">${isCricket ? 'Puan' : 'Kalan'}</div>
        <div class="score-display">${rem1}</div>
        <div class="player-stats">
          <div class="stat"><div class="label">Leg</div><div class="value">${G.legs[1]}</div></div>
          <div class="stat"><div class="label">Ort.</div><div class="value">${avg1}</div></div>
        </div>
      </div>
      <div class="player-panel ${!isTurn1 && !G.finished ? 'active' : ''}">
        <div class="player-name">${e2}</div>
        <div class="player-sub">${isCricket ? 'Puan' : 'Kalan'}</div>
        <div class="score-display">${rem2}</div>
        <div class="player-stats">
          <div class="stat"><div class="label">Leg</div><div class="value">${G.legs[2]}</div></div>
          <div class="stat"><div class="label">Ort.</div><div class="value">${avg2}</div></div>
        </div>
      </div>
    </div>

    ${cricketBoard}

    <div class="history-panel">
      <div class="history-rows">
        ${historyRows || '<div class="visit-row" style="opacity:0.3;"><div class="visit-score">—</div><div class="visit-num"></div><div class="visit-score">—</div></div>'}
      </div>
    </div>

    ${cricketKeypad}
  `;

  if (G.finished) showResult();
}

function renderCricketBoard() {
  const nums = G.cricket.nums;
  const renderMarks = (slot, n) => {
    const m = G.cricket.marks[slot][n] || 0;
    let marks = '';
    for (let i = 0; i < 3; i++) {
      marks += `<div class="cric-mark ${i < m ? (m >= 3 ? 'closed' : 'hit') : ''}">${i < m ? (m >= 3 ? '✓' : '×') : ''}</div>`;
    }
    return `<div class="cric-marks">${marks}</div>`;
  };
  const rows = nums.map(n => `
    <div>${renderMarks(1, n)}</div>
    <div class="cric-num">${n === 25 ? 'Bull' : n}</div>
    <div style="display:flex;justify-content:flex-end;">${renderMarks(2, n)}</div>
  `).join('');
  return `
    <div class="cricket-state">
      <div style="text-align:center;font-weight:700;font-size:0.8rem;color:var(--text-dim);">${G.names[1]}</div>
      <div></div>
      <div style="text-align:center;font-weight:700;font-size:0.8rem;color:var(--text-dim);">${G.names[2]}</div>
      ${rows}
    </div>`;
}

function showResult() {
  document.getElementById('game-panel').style.display = 'none';
  const rp = document.getElementById('result-panel');
  rp.style.display = 'flex';
  document.getElementById('winner-name').textContent = G.names[G.winnerSlot];
  const other = G.winnerSlot === 1 ? 2 : 1;
  document.getElementById('result-stats').textContent =
    `${G.names[G.winnerSlot]} ${G.legs[G.winnerSlot]} – ${G.legs[other]} ${G.names[other]}`;
}

// Service Worker kaydı
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// Klavye desteği
document.addEventListener('keydown', (e) => {
  if (!G || G.finished || G.mode === 'cricket') return;
  if (e.key >= '0' && e.key <= '9') scInput(e.key);
  else if (e.key === 'Backspace') scBackspace();
  else if (e.key === 'Enter') submitScore();
  else if (e.key === 'Escape') scClear();
});
</script>
</body>
</html>

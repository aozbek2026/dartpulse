<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TV Modu · Dart Turnuva</title>
<link rel="stylesheet" href="/css/style.css" />
<style>
  /* Reset organizer/main layout — TV needs full-bleed canvas */
  body { overflow: hidden; }
  .tv {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    background:
      radial-gradient(circle at 20% 0%, rgba(124, 92, 255, 0.12), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(0, 212, 255, 0.10), transparent 50%),
      var(--bg);
    color: var(--text);
    font-size: 1.1rem; /* base bumped for TV viewing distance */
  }

  /* Header strip */
  .tv-head {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 2.4rem;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.25);
  }
  .tv-brand { display: flex; align-items: center; gap: 0.9rem; font-size: 1.7rem; font-weight: 700; }
  .tv-brand .logo {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 18px var(--accent);
  }
  .tv-meta { display: flex; gap: 1.2rem; align-items: center; color: var(--text-dim); font-size: 1.05rem; }
  .tv-meta .live-dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--success);
    animation: tv-pulse 2s infinite;
    margin-right: 0.4rem;
  }
  .tv-meta.disconnected .live-dot { background: var(--danger); animation: none; }
  @keyframes tv-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.5; }
  }

  /* Section indicator dots */
  .tv-dots { display: flex; gap: 0.5rem; }
  .tv-dots .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--surface-2);
    transition: all 0.3s;
  }
  .tv-dots .dot.active { background: var(--accent-2); width: 28px; border-radius: 6px; }

  /* Body */
  .tv-body {
    flex: 1 1 auto; overflow: hidden;
    position: relative;
  }
  .tv-section {
    position: absolute; inset: 0;
    padding: 2rem 2.4rem;
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s, transform 0.5s;
    pointer-events: none;
    display: flex;
    flex-direction: column;
  }
  .tv-section.active {
    opacity: 1; transform: translateY(0);
    pointer-events: auto;
  }
  .tv-section h2 {
    font-size: 2.1rem; margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 0.7rem;
    flex: 0 0 auto;
  }
  .tv-section .sub { color: var(--text-dim); font-weight: 400; font-size: 1.1rem; }
  .tv-section > .tv-bracket,
  .tv-section > .tv-live-grid,
  .tv-section > .tv-recent-grid { flex: 1 1 auto; min-height: 0; }

  /* Live cards */
  .tv-live-grid {
    display: grid; gap: 1.5rem;
    grid-template-columns: repeat(auto-fit, minmax(540px, 1fr));
  }
  .tv-live-card {
    background: linear-gradient(135deg, var(--surface-2), var(--surface));
    border: 1px solid var(--border); border-radius: 16px;
    padding: 1.5rem 1.8rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .tv-live-card.live { border-color: rgba(255, 56, 96, 0.4); }
  .tv-live-card .meta {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--text-dim); font-size: 1rem; margin-bottom: 1rem;
  }
  .tv-live-card .player-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
  }
  .tv-live-card .player-row:last-child { border-bottom: none; }
  .tv-live-card .player-row.active-turn { color: var(--accent); }
  .tv-live-card .player-name { font-size: 1.7rem; font-weight: 700; }
  .tv-live-card .player-score {
    font-size: 2.6rem; font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .tv-live-card .footer {
    display: flex; justify-content: space-between;
    margin-top: 1rem; padding-top: 0.8rem;
    border-top: 1px solid var(--border);
    color: var(--text-dim); font-size: 0.95rem;
  }

  /* Standings */
  .tv-standings-table { width: 100%; border-collapse: collapse; font-size: 1.15rem; }
  .tv-standings-table th, .tv-standings-table td {
    padding: 0.8rem 0.9rem; text-align: left;
    border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .tv-standings-table th {
    color: var(--text-dim); font-size: 0.95rem;
    text-transform: uppercase; letter-spacing: 0.05em;
    font-weight: 600;
  }
  .tv-standings-table td.num { text-align: right; }
  .tv-standings-table tr.rank-1 td { background: rgba(251, 191, 36, 0.06); }
  .tv-rank {
    display: inline-block; min-width: 36px; text-align: center;
    padding: 0.2rem 0.55rem; border-radius: 8px;
    background: var(--surface-2); font-weight: 700; font-size: 1.1rem;
  }
  .tv-rank.gold { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1a1100; }
  .tv-rank.silver { background: linear-gradient(135deg, #d1d5db, #9ca3af); color: #1a1a1a; }
  .tv-rank.bronze { background: linear-gradient(135deg, #d97706, #92400e); color: #fff; }

  /* Recent finished */
  .tv-recent-grid {
    display: grid; gap: 0.9rem;
    grid-template-columns: repeat(2, 1fr);
  }
  .tv-recent-card {
    background: var(--surface-2); border-radius: 12px;
    padding: 1rem 1.3rem;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 1.2rem;
  }
  .tv-recent-card .winner { color: var(--success); font-weight: 700; }
  .tv-recent-card .pill {
    background: var(--surface); padding: 0.4rem 0.9rem; border-radius: 8px;
    font-variant-numeric: tabular-nums; font-weight: 700; font-size: 1.3rem;
  }

  /* Empty state */
  .tv-empty {
    display: flex; align-items: center; justify-content: center;
    height: 60vh;
    color: var(--text-dim); font-size: 1.6rem;
    flex-direction: column; gap: 0.6rem;
  }
  .tv-empty .icon { font-size: 4rem; opacity: 0.4; }

  /* Disconnect banner */
  .tv-banner {
    position: fixed; top: 0; left: 0; right: 0;
    background: var(--danger); color: white;
    padding: 0.9rem 1.5rem;
    text-align: center; font-weight: 700; font-size: 1.1rem;
    z-index: 1000;
    transform: translateY(-100%);
    transition: transform 0.3s;
  }
  .tv-banner.show { transform: translateY(0); }

  /* Exit hint */
  .tv-exit {
    position: fixed; bottom: 1rem; right: 1.5rem;
    color: var(--text-dim); font-size: 0.9rem;
    background: rgba(0,0,0,0.4); padding: 0.4rem 0.85rem;
    border-radius: 999px;
    text-decoration: none;
  }
  .tv-exit:hover { color: var(--text); }

  /* ===== Bracket — gerçek bracket görünümü ===== */
  .tv-bracket {
    display: flex;
    align-items: stretch;
    gap: 0;
    overflow: auto;
    padding: 0 0 1rem 0;
  }
  .tv-bracket .col {
    flex: 1 1 0;
    min-width: 240px;
    display: flex;
    flex-direction: column;
    padding: 0 1rem;
    position: relative;
  }
  .tv-bracket .col h4 {
    text-align: center;
    font-size: 1.05rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.6rem;
    flex: 0 0 auto;
  }
  .tv-bracket .col > .matches {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    position: relative;
    min-height: 0;
  }
  .tv-bracket .pair {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    position: relative;
    padding: 0.4rem 0;
  }
  .tv-bracket .match {
    position: relative;
    background: linear-gradient(135deg, var(--surface-2), var(--surface));
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 0.85rem;
    font-size: 1rem;
    flex: 0 0 auto;
  }
  .tv-bracket .match.live {
    border-color: var(--accent);
    box-shadow: 0 0 14px rgba(255, 56, 96, 0.3);
  }
  .tv-bracket .match.finished { opacity: 0.85; }
  .tv-bracket .match-live-dot {
    position: absolute;
    top: 0.5rem; right: 0.6rem;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: tv-pulse 1.5s infinite;
  }
  .tv-bracket .slot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.18rem 0;
    gap: 0.6rem;
  }
  .tv-bracket .slot:first-child {
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding-bottom: 0.32rem;
    margin-bottom: 0.18rem;
  }
  .tv-bracket .slot.winner { color: var(--success); font-weight: 700; }
  .tv-bracket .slot .name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .tv-bracket .slot .name em { color: var(--text-dim); font-style: normal; opacity: 0.7; }
  .tv-bracket .slot .score {
    color: var(--text);
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    flex: 0 0 auto;
  }
  .tv-bracket .slot .score small { font-size: 0.78rem; color: var(--text-dim); margin-left: 0.15rem; font-weight: 500; }

  /* === Bracket konnektör çizgileri === */
  /* Her maçın sağ tarafından çıkan yatay çizgi (son sütun hariç) */
  .tv-bracket .col:not(.last-col) .match::after {
    content: '';
    position: absolute;
    top: 50%;
    right: -1rem;
    width: 1rem;
    height: 1px;
    background: var(--border);
  }
  /* Her maçın sol tarafından giren yatay çizgi (ilk sütun hariç) */
  .tv-bracket .col + .col .match::before {
    content: '';
    position: absolute;
    top: 50%;
    left: -1rem;
    width: 1rem;
    height: 1px;
    background: var(--border);
  }
  /* Çift maçları birleştiren düşey çizgi (pair'in sağ kenarında) */
  .tv-bracket .col:not(.last-col) .pair::after {
    content: '';
    position: absolute;
    top: 25%;
    bottom: 25%;
    right: -1rem;
    width: 1px;
    background: var(--border);
  }
  /* Pair tek maçtan oluşuyorsa düşey çizgi gösterme */
  .tv-bracket .col:not(.last-col) .pair.single::after { display: none; }
</style>
</head>
<body>

<div class="tv-banner" id="banner">⚠️ Sunucu bağlantısı koptu — yeniden bağlanılıyor…</div>

<div class="tv">
  <header class="tv-head">
    <div class="tv-brand">
      <span class="logo"></span>
      <span>Dart Turnuva</span>
      <span class="sub" id="tournament-name" style="color: var(--text-dim); font-weight: 400; margin-left: 0.6rem;"></span>
    </div>
    <div class="tv-meta" id="meta">
      <div class="tv-dots" id="dots"></div>
      <div><span class="live-dot"></span><span id="conn-text">CANLI</span></div>
      <div id="clock"></div>
    </div>
  </header>

  <main class="tv-body">
    <section class="tv-section" id="tv-live"></section>
    <section class="tv-section" id="tv-standings"></section>
    <section class="tv-section" id="tv-bracket"></section>
    <section class="tv-section" id="tv-recent"></section>
  </main>
</div>

<a class="tv-exit" href="/viewer.html">⏏ Çıkış</a>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/common.js"></script>
<script src="/js/tv.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>İzleyici · Dart Turnuva</title>
<link rel="stylesheet" href="/css/style.css" />
<style>
  .viewer { padding-top: 0; }
  .top-bar {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: center; gap: 1.5rem;
    flex-wrap: wrap;
  }
  .top-bar h2 { margin: 0; font-size: 1.15rem; }
  .nav-pills {
    display: flex; gap: 0.4rem; flex-wrap: wrap; flex: 1;
  }
  .nav-pills a {
    padding: 0.4rem 0.85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .nav-pills a:hover, .nav-pills a.active { color: var(--text); border-color: var(--accent); }
  .top-bar-right { display: flex; gap: 0.5rem; }
  .btn-tv {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: var(--bg); padding: 0.4rem 0.9rem;
    border-radius: 999px; text-decoration: none; font-size: 0.85rem; font-weight: 600;
  }
  .content { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
  section.panel { scroll-margin-top: 80px; margin-bottom: 2rem; }
  section.panel h3 { margin-bottom: 1rem; font-size: 1.1rem; }

  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table th, .standings-table td {
    padding: 0.55rem 0.7rem; text-align: left;
    border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .standings-table th {
    color: var(--text-dim); font-size: 0.78rem;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .standings-table td.num { text-align: right; }
  .standings-table tr.rank-1 td:first-child { color: var(--accent); font-weight: 700; }
  .rank-pill {
    display: inline-block; min-width: 24px; text-align: center;
    padding: 0.1rem 0.45rem; border-radius: 6px;
    background: var(--surface-2); font-size: 0.85rem; font-weight: 600;
  }
  .rank-pill.gold { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1a1100; }
  .rank-pill.silver { background: linear-gradient(135deg, #d1d5db, #9ca3af); color: #1a1a1a; }
  .rank-pill.bronze { background: linear-gradient(135deg, #d97706, #92400e); color: #fff; }

  .filter-row { display: flex; gap: 0.5rem; margin-bottom: 0.85rem; flex-wrap: wrap; }
  .filter-row button {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); padding: 0.35rem 0.85rem;
    border-radius: 6px; cursor: pointer; font-size: 0.85rem;
  }
  .filter-row button.active { color: var(--text); border-color: var(--accent); background: var(--surface-2); }

  .matches-list { width: 100%; border-collapse: collapse; }
  .matches-list td {
    padding: 0.55rem 0.7rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .matches-list .vs { color: var(--text-dim); padding: 0 0.4rem; }
  .matches-list .winner { color: var(--accent); font-weight: 600; }

  .recent-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .recent-row {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--surface-2); padding: 0.65rem 0.85rem; border-radius: 8px;
    font-size: 0.92rem;
  }
  .recent-row .score-pill {
    background: var(--surface); padding: 0.2rem 0.55rem;
    border-radius: 6px; font-variant-numeric: tabular-nums; font-weight: 600;
  }
</style>
</head>
<body>
<div class="viewer">
  <div class="top-bar">
    <h2>🎯 Canlı Turnuva</h2>
    <nav class="nav-pills" id="nav">
      <a href="#sec-live">🔴 Canlı</a>
      <a href="#sec-standings">📊 Klasman</a>
      <a href="#sec-bracket">🏆 Bracket</a>
      <a href="#sec-matches">📋 Tüm Maçlar</a>
      <a href="#sec-recent">✅ Son Bitenler</a>
    </nav>
    <div class="top-bar-right">
      <a href="/tv.html" class="btn-tv">📺 TV Modu</a>
      <a href="/" class="btn secondary">Ana sayfa</a>
    </div>
  </div>

  <div class="content">
    <section id="sec-live" class="panel"><h3>🔴 Canlı Maçlar</h3><div id="live-host"></div></section>
    <section id="sec-standings" class="panel"><h3>📊 Genel Klasman</h3><div id="standings-host"></div></section>
    <section id="sec-bracket" class="panel"><h3>🏆 Bracket</h3><div id="bracket-host"></div></section>
    <section id="sec-matches" class="panel"><h3>📋 Tüm Maçlar</h3>
      <div class="filter-row" id="filter-row">
        <button data-filter="all" class="active">Hepsi</button>
        <button data-filter="live">🔴 Canlı</button>
        <button data-filter="ready">⏳ Bekleyen</button>
        <button data-filter="finished">✅ Bitmiş</button>
      </div>
      <div id="matches-host"></div>
    </section>
    <section id="sec-recent" class="panel"><h3>✅ Son Biten Maçlar</h3><div id="recent-host"></div></section>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/common.js"></script>
<script src="/js/viewer.js"></script>
</body>
</html>
